<div class="card">
  <div class="flex items-start justify-between">
    <div class="flex-1">
      @if (badge) {
        <span class="badge badge-primary mb-2">{{ badge }}</span>
      }
      <p class="text-sm text-gray-600 mb-1">{{ title }}</p>
      <h3 class="text-2xl font-bold text-gray-900">{{ value }}</h3>
      
      @if (change !== undefined) {
        <div class="flex items-center mt-2 space-x-1" [class]="changeClass">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            @if (changeIcon === 'up') {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
            } @else {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
            }
          </svg>
          <span class="text-sm font-medium">{{ change > 0 ? '+' : '' }}{{ change }}%</span>
        </div>
      }
    </div>
    
    @if (icon) {
      <div [class]="iconBg + ' ' + iconColor + ' w-12 h-12 rounded-lg flex items-center justify-center'">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          @switch (icon) {
            @case ('users') {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            }
            @case ('dollar') {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            }
            @case ('check') {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            }
            @case ('alert') {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            }
          }
        </svg>
      </div>
    }
  </div>
</div>
