<aside 
  [class.w-64]="!isCollapsed()"
  [class.w-20]="isCollapsed()"
  class="bg-white border-r border-gray-200 h-screen fixed left-0 top-0 transition-all duration-300 z-40"
>
  <!-- Logo -->
  <div class="flex items-center justify-between p-4 border-b border-gray-200">
    @if (!isCollapsed()) {
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-primary-600 rounded-lg flex items-center justify-center">
          <span class="text-white font-bold text-xl">A</span>
        </div>
        <div>
          <h1 class="text-lg font-bold text-gray-900">Akademia</h1>
          <p class="text-xs text-gray-500">Main Campus</p>
        </div>
      </div>
    } @else {
      <div class="w-10 h-10 bg-primary-600 rounded-lg flex items-center justify-center mx-auto">
        <span class="text-white font-bold text-xl">E</span>
      </div>
    }
  </div>

  <!-- Navigation -->
  <nav class="p-4 space-y-2">
    @for (item of filteredNavItems; track item.route) {
      <a
        [routerLink]="item.route"
        [class.bg-primary-50]="isActive(item.route)"
        [class.text-primary-600]="isActive(item.route)"
        [class.text-gray-700]="!isActive(item.route)"
        [class.justify-center]="isCollapsed()"
        class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-gray-100 transition-colors"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          @switch (item.icon) {
            @case ('grid') {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
            }
            @case ('book') {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            }
            @case ('users') {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            }
            @case ('dollar-sign') {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            }
            @case ('file-text') {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            }
            @case ('settings') {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            }
          }
        </svg>
        @if (!isCollapsed()) {
          <span class="font-medium">{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <!-- Quick Action Button -->
  <div class="absolute bottom-4 left-4 right-4">
    @if (!isCollapsed()) {
      <button class="btn-primary w-full">
        <span>+ Quick Action</span>
      </button>
    } @else {
      <button class="btn-primary w-12 h-12 rounded-full flex items-center justify-center mx-auto">
        <span class="text-xl">+</span>
      </button>
    }
  </div>

  <!-- Help Center -->
  <div class="absolute bottom-20 left-4 right-4">
    <a 
      href="#" 
      [class.justify-center]="isCollapsed()"
      class="flex items-center space-x-2 text-gray-600 hover:text-primary-600 transition-colors"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      @if (!isCollapsed()) {
        <span class="text-sm">Help Center</span>
      }
    </a>
  </div>
</aside>
